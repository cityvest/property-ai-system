<!DOCTYPE html>
<html>
<head>
  <title>AI Property System</title>
</head>
<body>

<h1>AI Property System</h1>

<h3>Buyer Criteria</h3>

<input id="location" placeholder="Location"><br><br>
<input id="budget" placeholder="Max Budget"><br><br>

<button onclick="generateLeads()">Generate Leads</button>

<h3>Leads</h3>
<div id="output"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDppJ2BQurJIk-LsOnLNi9wpuqbUs0yog4",
  authDomain: "property-ai-system.firebaseapp.com",
  projectId: "property-ai-system",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 GENERATE LEADS 
window.generateLeads = async () => {

  const res = await fetch("YOUR_APIFY_API_URL");

  const data = await res.json();

  for (let item of data) {

    await addDoc(collection(db, "leads"), {
      name: "FB Buyer",
      phone: item.phone,
      whatsapp: item.whatsapp,
      email: item.email,
      source: item.source
    });
  }
};  

// LIVE UPDATE
onSnapshot(collection(db, "leads"), (snap) => {
  let html = "";
  snap.forEach(doc => {
    const d = doc.data();

    html += `
      <div style="border:1px solid #ccc; padding:10px; margin:10px">
        <b>${d.name}</b><br/>
        ${d.phone}<br/>
        <a href="https://wa.me/${d.phone}" target="_blank">
          WhatsApp
        </a>
      </div>
    `;
  });
  document.getElementById("output").innerHTML = html;
});
</script>

</body>
</html>
