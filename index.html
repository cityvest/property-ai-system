<!DOCTYPE html>
<html>
<head>
  <title>AI Property System</title>
</head>
<body>

<h1>AI Property System</h1>

<button onclick="addTestLead()">Test Firebase</button>

<div id="output"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ✅ YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDppJ2BQurJIk-LsOnLNi9wpuqbUs0yog4",
  authDomain: "property-ai-system.firebaseapp.com",
  projectId: "property-ai-system",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ADD TEST LEAD
window.addTestLead = async () => {
  await addDoc(collection(db, "leads"), {
    name: "Test Lead",
    phone: "60123456789"
  });
};

// LIVE UPDATE
onSnapshot(collection(db, "leads"), (snap) => {
  let html = "";
  snap.forEach(doc => {
    const d = doc.data();
    html += `<p>${d.name} - ${d.phone}</p>`;
  });
  document.getElementById("output").innerHTML = html;
});
</script>

</body>
</html>
